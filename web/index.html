<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiskDataKit — 文件管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景装饰层：网格光斑 -->
    <div class="bg-decor" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <header class="app-header">
        <div class="header-inner">
            <a class="brand" href="#" onclick="loadPath('');return false;">
                <svg class="brand-logo" viewBox="0 0 16 16" width="22" height="22" aria-hidden="true">
                    <path fill="currentColor" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path>
                </svg>
                <span class="brand-name" data-text="DiskDataKit">DiskDataKit</span>
                <span class="brand-dot"></span>
            </a>
            <div class="header-actions">
                <button id="pickBtn" class="btn btn-accent" title="打开系统文件夹选择器">
                    <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5L6 1.75A1.75 1.75 0 0 0 4.75 1h-3Z"></path></svg>
                    <span class="btn-label">选择文件夹</span>
                </button>
                <select id="driveSelect" class="select" title="选择磁盘或最近访问"></select>
                <button id="upBtn" class="btn btn-ghost" title="返回上一级">
                    <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M3.22 10.53a.75.75 0 0 1 0-1.06L7.47 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 1 1-1.06 1.06L8 6.8l-3.72 3.72a.75.75 0 0 1-1.06 0Z"></path></svg>
                    <span class="btn-label">上级</span>
                </button>
                <button id="refreshBtn" class="btn btn-ghost" title="刷新">
                    <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.011a.25.25 0 0 1 .25.25v3.011a.25.25 0 0 1-.427.177l-1.38-1.38A7 7 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.49 5.49 0 0 0-4.388 2.196l1.204 1.204a.25.25 0 0 1-.177.427H1.628a.25.25 0 0 1-.25-.25V2.066a.25.25 0 0 1 .427-.177l1.38 1.38A7 7 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"></path></svg>
                    <span class="btn-label">刷新</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="card glass breadcrumb-card">
            <nav class="breadcrumb" id="breadcrumb" aria-label="路径导航"></nav>
        </section>

        <section id="chartCard" class="card glass chart-card hidden">
            <div class="card-header">
                <div class="title-group">
                    <span class="title-accent"></span>
                    <h2 class="card-title">大小分布 · 帕累托图</h2>
                    <div id="chartHint" class="chart-hint hidden"></div>
                </div>
                <div class="chart-legend">
                    <span class="legend-item"><span class="legend-bar"></span>文件大小</span>
                    <span class="legend-item"><span class="legend-line"></span>累计百分比</span>
                </div>
                <div class="card-header-line"></div>
            </div>
            <div class="chart-wrap">
                <canvas id="paretoCanvas"></canvas>
                <div id="chartTooltip" class="chart-tooltip hidden"></div>
            </div>
        </section>

        <section class="card glass file-card">
            <div class="card-header">
                <div class="title-group">
                    <span class="title-accent"></span>
                    <h2 class="card-title">文件列表</h2>
                    <div id="countBadge" class="count-badge hidden"></div>
                    <div id="totalSizeBadge" class="size-badge hidden"></div>
                </div>
                <div class="card-header-line"></div>
            </div>

            <div id="status" class="status hidden"></div>

            <div class="table-wrap">
                <table class="file-table">
                    <thead>
                        <tr>
                            <th class="col-name">名称</th>
                            <th class="col-size">大小</th>
                            <th class="col-date">修改时间</th>
                        </tr>
                    </thead>
                    <tbody id="fileList"></tbody>
                </table>
                <div id="skeleton" class="skeleton hidden">
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                </div>
                <div id="empty" class="empty hidden">
                    <div class="empty-icon">📂</div>
                    <p>此文件夹为空</p>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <span id="footerInfo"></span>
        </footer>
    </main>
    <script src="app.js"></script>
</body>
</html>
